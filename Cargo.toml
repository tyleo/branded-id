[workspace]
members = [
    "projects/id_sys",
    "projects/no_engine/no_engine",
    "projects/no_engine/no_engine_abstractions",
    "projects/no_engine/no_engine_impl_bevy",
    "projects/no_engine/no_engine_impl_extern",
    "projects/no_engine_test_game",
    "projects/wasm_extern_mem",
]
resolver = "2"

[patch.crates-io]
id_sys = { path = "projects/id_sys" }
no_engine = { path = "projects/no_engine/no_engine" }
no_engine_abstractions = { path = "projects/no_engine/no_engine_abstractions" }
no_engine_impl_bevy = { path = "projects/no_engine/no_engine_impl_bevy" }
no_engine_impl_extern = { path = "projects/no_engine/no_engine_impl_extern" }
no_engine_test_game = { path = "projects/no_engine_test_game" }
wasm_extern_mem = { path = "projects/wasm_extern_mem" }

# Enable more optimization in the release profile at the cost of compile time.
[profile.release]
# Compile the entire crate as one unit.
# Slows compile times, marginal improvements.
codegen-units = 1
# Do a second optimization pass over the entire program, including dependencies.
# Slows compile times, marginal improvements.
lto = "thin"

# Optimize for size in the wasm_release profile to reduce load times and bandwidth usage on web.
[profile.release-wasm]
# Default to release profile values.
inherits = "release"
# Optimize with size in mind (also try "z", sometimes it is better).
# Slightly slows compile times, great improvements to file size and runtime performance.
opt-level = "s"
# Strip all debugging information from the binary to slightly reduce file size.
strip = "debuginfo"
